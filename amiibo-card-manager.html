<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>amiiboカード管理</title>
  <style>
    :root {
      --bg: #08090b;
      --panel: #15171b;
      --panel-2: #20242a;
      --text: #f7f7f5;
      --muted: #a9b0ba;
      --line: #323841;
      --accent: #60d394;
      --accent-2: #f5c84c;
      --danger: #ff7575;
      --shadow: rgba(0, 0, 0, .32);
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; background: var(--bg); }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      min-height: 42px;
      border-radius: 8px;
      padding: 0 12px;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active { transform: translateY(1px); }

    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--panel);
      color: var(--text);
      outline: none;
    }

    input:focus, select:focus, button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 24%, transparent);
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px 12px 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 -12px 12px;
      padding: 12px;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.22rem, 4vw, 1.72rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .small {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
    }

    .progress-band {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 22px var(--shadow);
    }

    .metric b {
      display: block;
      font-size: clamp(1.02rem, 5vw, 1.5rem);
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: .75rem;
      margin-top: 4px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      padding-left: 38px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .chips {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 11px;
      border-radius: 999px;
      color: var(--muted);
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #06110b;
      font-weight: 700;
    }

    .utility-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0 12px;
    }

    .utility-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 42px;
      padding: 0;
    }

    .list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .card {
      display: grid;
      grid-template-columns: minmax(78px, 96px) 1fr;
      gap: 10px;
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 20px var(--shadow);
      overflow: hidden;
    }

    .num-block {
      display: grid;
      place-items: center;
      padding: 12px 8px;
      background: color-mix(in srgb, var(--accent) 15%, var(--panel-2));
      border-right: 1px solid var(--line);
    }

    .num {
      font-size: clamp(1.35rem, 8vw, 2.1rem);
      line-height: 1;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .series {
      margin-top: 5px;
      color: var(--muted);
      font-size: .76rem;
      text-align: center;
    }

    .card-body {
      min-width: 0;
      padding: 10px 10px 10px 0;
      display: grid;
      gap: 8px;
    }

    .name-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .name {
      min-width: 0;
      flex: 1;
      font-size: 1.02rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .status button {
      min-height: 34px;
      padding: 0 6px;
      font-size: .82rem;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .status button.active {
      color: #06110b;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 800;
    }

    .count-row {
      display: grid;
      grid-template-columns: auto 82px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: .84rem;
    }

    .count-row input {
      min-height: 34px;
      padding: 5px 8px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .drawer {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 40;
      max-height: 88vh;
      overflow: auto;
      padding: 14px 12px calc(14px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: var(--bg);
      box-shadow: 0 -24px 60px rgba(0,0,0,.45);
      transform: translateY(110%);
      transition: transform .2s ease;
    }

    .drawer.open { transform: translateY(0); }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .section {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .section h3 {
      margin: 0;
      font-size: .92rem;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .theme-swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-start;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.45);
      flex: 0 0 auto;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    input[type="color"] {
      padding: 3px;
      min-height: 42px;
    }

    .file-input {
      border: 1px dashed var(--line);
      padding: 10px;
      border-radius: 8px;
      background: var(--panel-2);
    }

    .empty {
      padding: 28px 14px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 16px;
      z-index: 60;
      display: none;
      width: min(520px, calc(100% - 24px));
      margin: 0 auto;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      box-shadow: 0 18px 40px rgba(0,0,0,.4);
    }

    .toast.show { display: block; }

    @media (min-width: 720px) {
      .app { padding: 18px 18px 34px; }
      .topbar { margin: 0 -18px 16px; padding: 14px 18px; }
      .toolbar {
        grid-template-columns: minmax(260px, 1.4fr) minmax(340px, 1fr);
        align-items: start;
      }
      .control-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .drawer {
        left: auto;
        width: min(520px, 100%);
        border-left: 1px solid var(--line);
      }
    }

    @media (min-width: 1060px) {
      .list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-row">
        <h1>amiiboカード管理</h1>
        <button class="icon-btn" id="settingsBtn" type="button" title="設定" aria-label="設定">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="2"/>
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2.1 2.1 0 0 1-2.96 2.96l-.04-.04a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1 1.56V21a2.1 2.1 0 0 1-4.2 0v-.06a1.7 1.7 0 0 0-1-1.56 1.7 1.7 0 0 0-1.88.34l-.04.04a2.1 2.1 0 0 1-2.96-2.96l.04-.04A1.7 1.7 0 0 0 4.2 15a1.7 1.7 0 0 0-1.56-1H2.6a2.1 2.1 0 0 1 0-4.2h.06a1.7 1.7 0 0 0 1.56-1 1.7 1.7 0 0 0-.34-1.88l-.04-.04a2.1 2.1 0 0 1 2.96-2.96l.04.04a1.7 1.7 0 0 0 1.88.34h.02a1.7 1.7 0 0 0 .98-1.56V2.7a2.1 2.1 0 0 1 4.2 0v.06a1.7 1.7 0 0 0 1 1.56 1.7 1.7 0 0 0 1.88-.34l.04-.04a2.1 2.1 0 0 1 2.96 2.96l-.04.04a1.7 1.7 0 0 0-.34 1.88 1.7 1.7 0 0 0 1.56 1h.06a2.1 2.1 0 0 1 0 4.2h-.06a1.7 1.7 0 0 0-1.56 1Z" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
      </div>
      <section class="progress-band" aria-label="コンプ率">
        <div class="metric"><b id="ownedMetric">0 / 448</b><span>所持数</span></div>
        <div class="metric"><b id="rateMetric">0.0%</b><span>コンプ率</span></div>
        <div class="metric"><b id="dupMetric">0</b><span>ダブり</span></div>
      </section>
    </header>

    <section class="toolbar" aria-label="検索と絞り込み">
      <div class="search-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.35-4.35M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" placeholder="名前・カード番号で検索" autocomplete="off">
      </div>
      <div class="control-grid">
        <select id="sortSelect" aria-label="並び替え">
          <option value="number">カード番号順</option>
          <option value="name">あいうえお順</option>
        </select>
        <select id="seriesSelect" aria-label="シリーズ絞り込み">
          <option value="all">全シリーズ</option>
        </select>
        <select id="pageSizeSelect" aria-label="表示件数">
          <option value="60">60件表示</option>
          <option value="120">120件表示</option>
          <option value="448">全件表示</option>
        </select>
      </div>
    </section>

    <nav class="chips" aria-label="所持状態フィルター">
      <button class="chip active" type="button" data-filter="all">すべて</button>
      <button class="chip" type="button" data-filter="owned">所持のみ</button>
      <button class="chip" type="button" data-filter="missing">未所持のみ</button>
      <button class="chip" type="button" data-filter="duplicate">ダブりのみ</button>
      <button class="chip" type="button" data-filter="sp">SPカード</button>
    </nav>

    <div class="utility-row">
      <span class="small" id="resultLabel">0件</span>
      <div class="utility-actions">
        <button id="loadMoreBtn" type="button">もっと表示</button>
        <button id="exportBtn" type="button">CSV出力</button>
      </div>
    </div>

    <section class="list" id="cardList" aria-label="カード一覧"></section>
  </main>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <h2>設定</h2>
      <button class="icon-btn" id="closeDrawerBtn" type="button" title="閉じる" aria-label="閉じる">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="settings-grid">
      <section class="section">
        <h3>テーマ</h3>
        <div class="theme-grid" id="themeGrid"></div>
      </section>
      <section class="section">
        <h3>カスタムテーマ</h3>
        <div class="color-grid">
          <label>背景色<input id="customBg" type="color" value="#08090b"></label>
          <label>文字色<input id="customText" type="color" value="#f7f7f5"></label>
          <label>アクセント<input id="customAccent" type="color" value="#60d394"></label>
          <label>パネル<input id="customPanel" type="color" value="#15171b"></label>
        </div>
        <button id="applyCustomBtn" type="button">適用</button>
      </section>
      <section class="section">
        <h3>CSV取り込み</h3>
        <input class="file-input" id="importInput" type="file" accept=".csv,text/csv">
        <span class="small">列: number,name,series,status,count。CSV出力したファイルをそのまま戻せます。</span>
      </section>
      <section class="section">
        <h3>データ操作</h3>
        <button id="resetBtn" type="button">全カードを所持に戻す</button>
      </section>
    </div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>

    };
    const CARD_NAMES = ["しずえ","たぬきち","DJ K.K","あさみ","かっぺい","リセットさん","カブリバ","まめきち","ケント","ラコスケ","カットリーヌ","つねきち","ローラン","ゆめみ","コトブキ","ホンマさん","タクミ","ニコバン","ドレミ","ガンテツ","ブレンダ","ヒョウタ","アセロラ","リカルド","たもつ","おさい","トムソン","エスメラルダ","グレオ","バズレー","クリス","グルミン","ピータン","キャビア","デリー","クロコ","かぶきち","カルピ","ジーニョ","リンダ","タックン","マリア","ホッケー","シェリー","おくたろう","マキバスター","キンカク","ギンカク","ミミィ","ビンタ","オパール","グミ","らっきょ","まりも","モモチ","ルーズ","ケイン","ジェーン","バッカス","ピース","れんにゅう","ボルシチ","ミント","きんぞう","うずまき","ビリー","ゆきみ","デースケ","イザベラ","ガブリエル","ユーカリ","ライオネル","レイラ","ハカセ","アンデス","クワトロ","ハンナ","シュバルツ","トンコ","ロッキー","モヘア","ケンタ","みやび","ハチ","ブリトニー","チーフ","リリアン","どぐろう","ナタリー","エックスエル","フリル","ヘンリー","あんこ","さくらじま","ももこ","アマミン","マリー","ペンタ","カモミ","ベン","とたけけ","リサ","シャンク","ケイト","おまわりさんA","おまわりさんB","まいこちゃん","つぶきち","えきいんさん","クク","ししょー","ラケットさん","しずえ","あやしいネコ","カメヤマさん","うおまさ","パンプキング","ポンチョ","みかっち","ドングリ","ティーナ","マスカラス","ジェシカ","オリバー","ポーラ","テッチャン","アップリケ","バンタム","まきば","カール","ナッキー","ガビ","サバンナ","やさお","ヒノコ","しもやけ","ペリーヌ","ハイド","シルエット","クスケチャ","チッチ","ふみたろう","オリビア","アラン","チョコ","ジミー","マモル","ビアンカ","ブロッコリー","やよい","クロー","みぞれ","アルベルト","ユメコ","ジョン","ペチカ","ピン","つかさ","ネルソン","ジャスミン","たいへいた","アザラク","キザノホマレ","コユキ","リッキー","ショコラ","ペーター","スミ","グラさん","ルナ","ぺしみち","アグネス","ジュリー","マルコ","ツバクロ","フラッペ","さすけ","クッチャネ","ダルマン","レベッカ","フォアグラ","メルボルン","フルメタル","ラザニア","トンファン","チャーミー","ノルマン","ナイル","ドク","メリヤス","もんじゃ","パトラ","フランク","ちとせ","ハムジ","ツンドラ","1ごう","2ごう","3ごう","4ごう","みしらぬネコ","フータ","たぬきち","ぺりこ","ぺりみ","ぺりお","きぬよ","レイジ","セイイチ","カイゾー","ゲコ","まめきち","ケント","ラケットさん","しずえ","フランクリン","ジングル","レイニー","アンチョビ","トラこ","アイダホ","ミランダ","ヤマト","レイチェル","クロベエ","マール","ロデオ","チャコ","ハルマキ","ピティエ","キング","キャンベラ","アンソニー","タコリーナ","ポーク","マグロ","タケル","サブリナ","カジロウ","ナディア","スナイル","ユキ","タツオ","ヒャクパー","チャンプ","エレフィン","サム","アイリス","ベアード","ドミグラ","パンタ","さっち","ゲンジ","ふくこ","ロボ","アイーダ","クマロス","バニラ","アセクサ","エイプリル","はじめ","しのぶ","モサキチ","ジュン","ためこ","リチャード","ロッタ","ヴァヤシコフ","サラ","マイク","カルロス","リリィ","ジンペイ","フララ","ハムスケ","キッズ","サルモンティ","とめ","ロビン","セントアロー","オズモンド","ウズメ","ハルク","チーズ","パティ","ビス","マリリン","ハムカツ","ショーイ","キャロライン","ちゅんのすけ","トロワ","チョモラン","メープル","マコト","シャンティ","アポロ","ボン","フランソワ","クリスチーヌ","しずえ","マスター","ハッケミィ","パロンチーノ","フーコ","つぶきち","グレース","クーコ","リセットさん","まめきち","タクミ","ししょー","ベルリーナ","ジョニー","つねきち","ぴょんたろう","キャラメル","パッチ","タンタン","リック","スミモモ","ゴンザレス","ちょい","グラハム","ドサコ","ヒュージ","チューこ","まんたろう","カサンドラ","タイシ","バーバラ","ボブ","ラムネ","チャック","マーサ","セバスチャン","タキュ","シベリア","ウェンディ","ボルト","アデレード","トミ","あるみ","チャス","ハナコ","ダンベル","アネッサ","アントニオ","ルーシー","サブレ","チョキ","アーサー","モンこ","カンロク","ミラコ","ジュペッティ","オーロラ","オカッピ","アップル","ジャン","たま","スパーク","ティファニー","タコヤ","ちえり","ガチャ","シルブプレ","チャウヤン","シルビア","ジョッキー","ララミー","トビオ","のりっぺ","くるぶし","アリア","ちょろきち","シドニー","ニッシー","ガリガリ","イノッチ","スワンソン","ブンジロウ","ディビッド","サリー","ラッキー","ブーケ","ゴメス","アンヌ","ブルース","サントス","アリゲッティ","トキオ","コージィ","ムー","パセリ","エテキチ","のりまき","セルバンテス","ピーチク","パーチク","たぬきち","まめきち＆つぶきち","しずえ","モーリー","ロドリー","フータ","フーコ","きぬよ","あさみ","ことの","とたけけ","ジャスティン","レックス","ウリ","シャンク","ローラン","パニエル","ジョニー","ゆうたろう","タクミ","ニコ","ナッティー","たぬきち","しずえ","レム","キャンディ","ちゃちゃまる","モニカ","パンクス","みすず","ジャック","リアーナ","ミッチェル","スピカ","テンシン","よしの","ドンチャン","リカ","ギーガー","シオン","のぶお","ビーフン","フェザー","デジャネイロ","シャンペン","ペチュニア","ピロンコン","マーチ"];
    const KANA_FALLBACK = "ん";
    const state = {
      cards: [],
      filter: "all",
      search: "",
      sort: "number",
      series: "all",
      pageSize: 60,
      visibleCount: 60,
      theme: "dark"
    };

    const el = {
      ownedMetric: document.getElementById("ownedMetric"),
      rateMetric: document.getElementById("rateMetric"),
      dupMetric: document.getElementById("dupMetric"),
      searchInput: document.getElementById("searchInput"),
      sortSelect: document.getElementById("sortSelect"),
      seriesSelect: document.getElementById("seriesSelect"),
      pageSizeSelect: document.getElementById("pageSizeSelect"),
      resultLabel: document.getElementById("resultLabel"),
      cardList: document.getElementById("cardList"),
      loadMoreBtn: document.getElementById("loadMoreBtn"),
      exportBtn: document.getElementById("exportBtn"),
      settingsBtn: document.getElementById("settingsBtn"),
      drawer: document.getElementById("drawer"),
      closeDrawerBtn: document.getElementById("closeDrawerBtn"),
      themeGrid: document.getElementById("themeGrid"),
      customBg: document.getElementById("customBg"),
      customText: document.getElementById("customText"),
      customAccent: document.getElementById("customAccent"),
      customPanel: document.getElementById("customPanel"),
      applyCustomBtn: document.getElementById("applyCustomBtn"),
      importInput: document.getElementById("importInput"),
      resetBtn: document.getElementById("resetBtn"),
      toast: document.getElementById("toast")
    };

    function createCatalogue() {
      const cards = [];
      for (let number = 1; number <= 448; number += 1) {
        const series = number <= 100 ? "第1弾" :
          number <= 200 ? "第2弾" :
          number <= 300 ? "第3弾" :
          number <= 400 ? "第4弾" : "第5弾";
        const isSp = (number <= 17) || (number >= 101 && number <= 117) ||
          (number >= 201 && number <= 217) || (number >= 301 && number <= 317) ||
          (number >= 401 && number <= 424);
        cards.push({
          number: String(number).padStart(3, "0"),
          name: CARD_NAMES[number - 1] || "",
          series,
          isSp,
          status: "owned",
          count: 1
        });
      }
      return cards;
    }

    function loadState() {
      const base = createCatalogue();
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        if (Array.isArray(saved.cards)) {
          const byNumber = new Map(saved.cards.map(card => [String(card.number).padStart(3, "0"), card]));
          state.cards = base.map(card => {
            const savedCard = byNumber.get(card.number);
            if (!savedCard) return card;
            return { ...card, ...savedCard, name: savedCard.name || card.name };
          });
        } else {
          state.cards = base;
        }
        Object.assign(state, {
          filter: saved.filter || state.filter,
          sort: saved.sort || state.sort,
          series: saved.series || state.series,
          pageSize: Number(saved.pageSize) || state.pageSize,
          visibleCount: Number(saved.pageSize) || state.visibleCount,
          theme: saved.theme || state.theme,
          customTheme: saved.customTheme
        });
      } catch {
        state.cards = base;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        cards: state.cards,
        filter: state.filter,
        sort: state.sort,
        series: state.series,
        pageSize: state.pageSize,
        theme: state.theme,
        customTheme: state.customTheme
      }));
    }

    function applyTheme(name) {
      const theme = name === "custom" ? state.customTheme : THEMES[name];
      if (!theme) return;
      const root = document.documentElement.style;
      root.setProperty("--bg", theme.bg);
      root.setProperty("--panel", theme.panel);
      root.setProperty("--panel-2", theme.panel2 || theme.panel);
      root.setProperty("--text", theme.text);
      root.setProperty("--muted", theme.muted || "#a9b0ba");
      root.setProperty("--line", theme.line || "#323841");
      root.setProperty("--accent", theme.accent);
      root.setProperty("--accent-2", theme.accent2 || theme.accent);
      document.documentElement.style.colorScheme = name === "light" ? "light" : "dark";
      state.theme = name;
      saveState();
    }

    function renderThemes() {
      el.themeGrid.innerHTML = "";
      Object.entries(THEMES).forEach(([key, theme]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "theme-swatch";
        button.innerHTML = `<span class="swatch" style="background:${theme.accent}"></span><span>${theme.label}</span>`;
        button.addEventListener("click", () => {
          applyTheme(key);
          showToast(`${theme.label}テーマを適用しました`);
        });
        el.themeGrid.appendChild(button);
      });
    }

    function populateSeries() {
      const values = [...new Set(state.cards.map(card => card.series))];
      el.seriesSelect.innerHTML = `<option value="all">全シリーズ</option>` + values.map(value => `<option value="${value}">${value}</option>`).join("");
      el.seriesSelect.value = state.series;
    }

    function normalize(value) {
      return String(value || "").trim().toLowerCase();
    }

    function filteredCards() {
      const q = normalize(state.search);
      return state.cards
        .filter(card => {
          if (state.filter === "owned" && card.count < 1) return false;
          if (state.filter === "missing" && card.count > 0) return false;
          if (state.filter === "duplicate" && card.count < 2) return false;
          if (state.filter === "sp" && !card.isSp) return false;
          if (state.series !== "all" && card.series !== state.series) return false;
          if (!q) return true;
          return normalize(card.number).includes(q) || normalize(card.name).includes(q);
        })
        .sort((a, b) => {
          if (state.sort === "name") {
            const aName = a.name || KANA_FALLBACK + a.number;
            const bName = b.name || KANA_FALLBACK + b.number;
            return aName.localeCompare(bName, "ja") || a.number.localeCompare(b.number);
          }
          return a.number.localeCompare(b.number);
        });
    }

    function cardStatus(card) {
      if (card.count >= 2) return "duplicate";
      if (card.count === 1) return "owned";
      return "missing";
    }

    function setCardCount(card, count) {
      card.count = Math.max(0, Math.min(99, Number(count) || 0));
      card.status = cardStatus(card);
      saveState();
      render();
    }

    function renderMetrics() {
      const owned = state.cards.filter(card => card.count > 0).length;
      const dup = state.cards.reduce((sum, card) => sum + Math.max(0, card.count - 1), 0);
      const rate = (owned / state.cards.length) * 100;
      el.ownedMetric.textContent = `${owned} / ${state.cards.length}`;
      el.rateMetric.textContent = `${rate.toFixed(1)}%`;
      el.dupMetric.textContent = String(dup);
    }

    function renderList() {
      const cards = filteredCards();
      const visible = cards.slice(0, state.visibleCount);
      el.resultLabel.textContent = `${cards.length}件中 ${visible.length}件表示`;
      el.loadMoreBtn.style.display = visible.length < cards.length ? "" : "none";
      if (!visible.length) {
        el.cardList.innerHTML = `<div class="empty">条件に合うカードがありません</div>`;
        return;
      }
      el.cardList.innerHTML = visible.map(card => `
        <article class="card" data-number="${card.number}">
          <div class="num-block">
            <div>
              <div class="num">${card.number}</div>
              <div class="series">${card.series}${card.isSp ? " / SP" : ""}</div>
            </div>
          </div>
          <div class="card-body">
            <div class="name-row">
              <div class="name" title="${escapeHtml(card.name || "名前未設定")}">${escapeHtml(card.name || "名前未設定")}</div>
              <button class="icon-btn edit-name" type="button" title="名前編集" aria-label="${card.number}の名前編集">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <div class="status" role="group" aria-label="${card.number}の所持状態">
              <button type="button" class="${card.count === 0 ? "active" : ""}" data-count="0">未所持</button>
              <button type="button" class="${card.count === 1 ? "active" : ""}" data-count="1">所持</button>
              <button type="button" class="${card.count >= 2 ? "active" : ""}" data-count="2">複数</button>
            </div>
            <label class="count-row">枚数
              <input type="number" inputmode="numeric" min="0" max="99" value="${card.count}" aria-label="${card.number}の枚数">
            </label>
          </div>
        </article>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function render() {
      renderMetrics();
      renderList();
      syncControls();
    }

    function syncControls() {
      el.sortSelect.value = state.sort;
      el.pageSizeSelect.value = String(state.pageSize);
      document.querySelectorAll(".chip").forEach(chip => {
        chip.classList.toggle("active", chip.dataset.filter === state.filter);
      });
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.toast.classList.remove("show"), 2200);
    }

    function exportCsv() {
      const header = ["number", "name", "series", "status", "count"];
      const rows = state.cards.map(card => [
        card.number,
        card.name,
        card.series,
        cardStatus(card),
        card.count
      ]);
      const csv = [header, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\r\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `amiibo-cards-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("CSVを書き出しました");
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some(value => value !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      row.push(cell);
      if (row.some(value => value !== "")) rows.push(row);
      return rows;
    }

    function importCsv(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const rows = parseCsv(String(reader.result || "").replace(/^\ufeff/, ""));
        if (rows.length < 2) {
          showToast("CSVを読み込めませんでした");
          return;
        }
        const header = rows[0].map(normalize);
        const index = name => header.indexOf(name);
        const numberIndex = index("number");
        if (numberIndex < 0) {
          showToast("number列が必要です");
          return;
        }
        const byNumber = new Map(state.cards.map(card => [card.number, card]));
        rows.slice(1).forEach(row => {
          const number = String(row[numberIndex] || "").replace(/\D/g, "").padStart(3, "0");
          const card = byNumber.get(number);
          if (!card) return;
          const nameIndex = index("name");
          const seriesIndex = index("series");
          const countIndex = index("count");
          const statusIndex = index("status");
          if (nameIndex >= 0) card.name = row[nameIndex] || "";
          if (seriesIndex >= 0 && row[seriesIndex]) card.series = row[seriesIndex];
          if (countIndex >= 0) {
            card.count = Math.max(0, Math.min(99, Number(row[countIndex]) || 0));
          } else if (statusIndex >= 0) {
            card.count = normalize(row[statusIndex]).includes("duplicate") ? 2 : normalize(row[statusIndex]).includes("owned") ? 1 : 0;
          }
          card.status = cardStatus(card);
        });
        saveState();
        populateSeries();
        render();
        showToast("CSVを取り込みました");
      };
      reader.readAsText(file, "utf-8");
    }

    function bindEvents() {
      el.searchInput.addEventListener("input", event => {
        state.search = event.target.value;
        state.visibleCount = state.pageSize;
        render();
      });
      el.sortSelect.addEventListener("change", event => {
        state.sort = event.target.value;
        saveState();
        render();
      });
      el.seriesSelect.addEventListener("change", event => {
        state.series = event.target.value;
        state.visibleCount = state.pageSize;
        saveState();
        render();
      });
      el.pageSizeSelect.addEventListener("change", event => {
        state.pageSize = Number(event.target.value);
        state.visibleCount = state.pageSize;
        saveState();
        render();
      });
      document.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          state.filter = chip.dataset.filter;
          state.visibleCount = state.pageSize;
          saveState();
          render();
        });
      });
      el.loadMoreBtn.addEventListener("click", () => {
        state.visibleCount += state.pageSize;
        render();
      });
      el.exportBtn.addEventListener("click", exportCsv);
      el.cardList.addEventListener("click", event => {
        const article = event.target.closest(".card");
        if (!article) return;
        const card = state.cards.find(item => item.number === article.dataset.number);
        if (!card) return;
        const statusButton = event.target.closest("button[data-count]");
        if (statusButton) {
          setCardCount(card, Number(statusButton.dataset.count));
          return;
        }
        if (event.target.closest(".edit-name")) {
          const next = prompt(`${card.number} のキャラクター名`, card.name);
          if (next !== null) {
            card.name = next.trim();
            saveState();
            render();
          }
        }
      });
      el.cardList.addEventListener("change", event => {
        const input = event.target.closest("input[type='number']");
        const article = event.target.closest(".card");
        if (!input || !article) return;
        const card = state.cards.find(item => item.number === article.dataset.number);
        if (card) setCardCount(card, input.value);
      });
      el.settingsBtn.addEventListener("click", () => {
        el.drawer.classList.add("open");
        el.drawer.setAttribute("aria-hidden", "false");
      });
      el.closeDrawerBtn.addEventListener("click", () => {
        el.drawer.classList.remove("open");
        el.drawer.setAttribute("aria-hidden", "true");
      });
      el.applyCustomBtn.addEventListener("click", () => {
        state.customTheme = {
          bg: el.customBg.value,
          panel: el.customPanel.value,
          panel2: el.customPanel.value,
          text: el.customText.value,
          muted: "#a9b0ba",
          line: "#56606b",
          accent: el.customAccent.value
        };
        applyTheme("custom");
        showToast("カスタムテーマを適用しました");
      });
      el.importInput.addEventListener("change", event => {
        const file = event.target.files && event.target.files[0];
        if (file) importCsv(file);
        event.target.value = "";
      });
      el.resetBtn.addEventListener("click", () => {
        if (!confirm("所持状態と枚数をすべて初期状態の「所持」に戻しますか？名前とシリーズは残します。")) return;
        state.cards.forEach(card => {
          card.count = 1;
          card.status = "owned";
        });
        saveState();
        render();
        showToast("全カードを所持に戻しました");
      });
    }

    loadState();
    renderThemes();
    populateSeries();
    applyTheme(state.theme);
    bindEvents();
    render();
  </script>
</body>
</html>
